name: Strava Auto Kudos Cookies Scraping

on:
  workflow_dispatch:
  schedule:
    - cron: '43 * * * *' # Spustí se automaticky každé 2 hodiny

jobs:
  kudos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Kudos Cookie Script
        env:
          STRAVA_COOKIE: ${{ secrets.STRAVA_COOKIE }}
        run: |
          python -c "
          import os, time, random
          from playwright.sync_api import sync_playwright

          cookie_value = os.environ.get('STRAVA_COOKIE')

          if not cookie_value:
              print('Chyba: Chybí STRAVA_COOKIE v Secrets!'); exit(1)

          # --- NASTAVENÍ MAXIMÁLNÍHO STROPU LAJKŮ ---
          MAX_TOTAL_KUDOS = 50
          total_kudos_given = 0

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(viewport={'width': 1280, 'height': 800})
              
              context.add_cookies([{
                  'name': '_strava4_session',
                  'value': cookie_value,
                  'domain': '.strava.com',
                  'path': '/'
              }])
              
              page = context.new_page()

              # --- ZDE SI VŽDYCKY PŘEPLÁCNEŠ TU SVOJI PĚTKU KLUBŮ Z TEXTOVÉHO EDITORU ---
              urls_to_check = [
                  'https://www.strava.com/dashboard',
                  'https://www.strava.com/dashboard?club_id=932688&feed_type=club',
                  'https://www.strava.com/dashboard?club_id=3812&feed_type=club',
                  'https://www.strava.com/dashboard?club_id=189058&feed_type=club',
                  'https://www.strava.com/dashboard?club_id=482331&feed_type=club',
                  'https://www.strava.com/dashboard?club_id=5854&feed_type=club&num_entries=40'
              ]

              for url in urls_to_check:
                  # Pojistka: Pokud jsme již dosáhli celkového limitu, nebudeme otevírat další stránky
                  if total_kudos_given >= MAX_TOTAL_KUDOS:
                      print(f'\n[STOP] Dosažen celkový strop {MAX_TOTAL_KUDOS} kudos. Přeskakuji zbytek adres.')
                      break

                  print(f'\n--- Prohlížím stránku: {url} ---')
                  if page.url != url:
                      page.goto(url)
                      time.sleep(5) # Čas na plné načtení stránky

                  if 'login' in page.url:
                      print('Chyba: Prohlížeč byl přesměrován na přihlášení. Cookie vypršela.'); break

                  buttons = page.query_selector_all('button[data-testid=\"kudos_button\"], button[title=\"Give kudos\"], button:has-text(\"👍\")')
                  print(f'Nalezeno {len(buttons)} tlačítek pro kudos.')

                  clicked_count = 0
                  for index, btn in enumerate(buttons):
                      # Pojistka uvnitř klikací smyčky
                      if total_kudos_given >= MAX_TOTAL_KUDOS:
                          print(f'  [STOP] Dosáhli jsme limitu {MAX_TOTAL_KUDOS} kudos během klikání na této stránce.')
                          break

                      svg = btn.query_selector('svg')
                      is_filled = False
                      if svg:
                          fill_attr = svg.get_attribute('fill')
                          if fill_attr and fill_attr != 'none' and 'currentColor' not in fill_attr:
                              is_filled = True

                      if not is_filled:
                          try:
                              btn.scroll_into_view_if_needed()
                              btn.click(timeout=3000)
                              clicked_count += 1
                              total_kudos_given += 1
                              print(f'  [OK] Kliknuto na palec (Celkem v tomto běhu: {total_kudos_given}/{MAX_TOTAL_KUDOS})')
                              
                              # PLOVOUCÍ ČAS: Vybere náhodné číslo od 3.0 do 7.0 vteřin
                              random_pause = random.uniform(3, 7)
                              time.sleep(random_pause)
                              
                          except Exception:
                              pass

                  print(f'Na této stránce nově doklikáno {clicked_count} palců.')

              browser.close()
              print(f'\nHotovo! Celkem v tomto běhu rozdáno {total_kudos_given} kudos.')
          "
