name: Strava Auto Kudos Klub Python

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  kudos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Kudos Script
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          python -c "
          import os, requests, time

          # 1. Získání access tokenu
          res = requests.post('https://www.strava.com/oauth/token', data={
              'client_id': os.environ['STRAVA_CLIENT_ID'],
              'client_secret': os.environ['STRAVA_CLIENT_SECRET'],
              'refresh_token': os.environ['STRAVA_REFRESH_TOKEN'],
              'grant_type': 'refresh_token'
          }).json()

          if 'access_token' not in res:
              print('Chyba autorizace. Zkontroluj tokeny!'); exit(1)

          token = res['access_token']
          headers = {'Authorization': f'Bearer {token}'}

          # SEZNAM TVÝCH KLUBŮ - sem večer dopiš další
          clubs = ['canyon']

          total_kudos = 0

          for club_id in clubs:
              print(f'--- Načítám aktivity z klubu: {club_id} ---')
              
              url = f'https://www.strava.com/api/v3/clubs/{club_id}/activities'
              activities = requests.get(url, headers=headers, params={'per_page': 7}).json()

              if not isinstance(activities, list):
                  print(f'Z klubu {club_id} se nepodařilo načíst data.')
                  continue

              print(f'Nalezeno {len(activities)} aktivit k prověření.')

              for act in activities:
                  # Získáváme pravé ID aktivity z jejího detailu
                  # Klubové aktivity mají specifickou strukturu, ID bývá jako int/float
                  club_act_id = act.get('id')
                  if not club_act_id:
                      continue

                  firstname = act.get('athlete', {}).get('firstname', '')
                  lastname = act.get('athlete', {}).get('lastname', '')
                  name = f'{firstname} {lastname}'.strip() or 'Biker'

                  # Zkusíme poslat kudos přímo na zjištěné ID
                  kudo_res = requests.post(f'https://www.strava.com/api/v3/activities/{club_act_id}/kudos', headers=headers)
                  
                  if kudo_res.status_code in [200, 201]:
                      print(f'  [OK] Úspěšně udělen palec pro: {name}')
                      total_kudos += 1
                  elif kudo_res.status_code == 403:
                      # Již uděleno dříve
                      pass
                  else:
                      print(f'  [Info] Aktivita {club_act_id} ({name}) vrátila status {kudo_res.status_code}')
                  
                  # Drobná pauza, ať Stravu nenaštveme rychlými požadavky
                  time.sleep(0.5)

          print(f'=== Akce dokončena. Celkem nově rozdáno {total_kudos} palců. ===')
          "
