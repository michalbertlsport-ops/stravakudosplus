name: Strava Auto Kudos Cookies Scraping

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  kudos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Playwright and dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: Run Kudos Cookie Script
        env:
          STRAVA_COOKIE: ${{ secrets.STRAVA_COOKIE }}
        run: |
          python -c "
          import os, time
          from playwright.sync_api import sync_playwright

          cookie_value = os.environ.get('STRAVA_COOKIE')

          if not cookie_value:
              print('Chyba: Chybí STRAVA_COOKIE v Secrets!'); exit(1)

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(viewport={'width': 1280, 'height': 800})
              
              # Podstrčíme prohlížeči přihlašovací cookie
              context.add_cookies([{
                  'name': '_strava4_session',
                  'value': cookie_value,
                  'domain': '.strava.com',
                  'path': '/'
              }])
              
              page = context.new_page()

              # Jdeme rovnou na dashboard, měli bychom být přihlášeni
              print('Otevírám hlavní feed Stravy...')
              page.goto('https://www.strava.com/dashboard')
              time.sleep(4)

              # SEZNAM STRÁNEK K PROKLIKÁNÍ
              urls_to_check = [
                  'https://www.strava.com/dashboard',
                  'https://www.strava.com/clubs/canyon'
              ]

              for url in urls_to_check:
                  print(f'\n--- Prohlížím stránku: {url} ---')
                  if page.url != url:
                      page.goto(url)
                      time.sleep(4)

                  # Kontrola, zda nejsme na login stránce (vypršelá cookie)
                  if 'login' in page.url:
                      print('Chyba: Prohlížeč byl přesměrován na přihlášení. Cookie je neplatná nebo vypršela.'); break

                  # Najdeme kudos tlačítka
                  buttons = page.query_selector_all('button[data-testid=\"kudos_button\"], button[title=\"Give kudos\"], button:has-text(\"👍\")')
                  print(f'Nalezeno {len(buttons)} tlačítek pro kudos.')

                  clicked_count = 0
                  for index, btn in enumerate(buttons):
                      svg = btn.query_selector('svg')
                      is_filled = False
                      if svg:
                          fill_attr = svg.get_attribute('fill')
                          if fill_attr and fill_attr != 'none' and 'currentColor' not in fill_attr:
                              is_filled = True

                      if not is_filled:
                          try:
                              btn.scroll_into_view_if_needed()
                              btn.click(timeout=3000)
                              clicked_count += 1
                              print(f'  [OK] Kliknuto na palec č. {index + 1}')
                              time.sleep(1.5)
                          except Exception:
                              pass

                  print(f'Na této stránce nově doklikáno {clicked_count} palců.')

              browser.close()
              print('\nParáda! Všechny stránky mechanicky proklikány.')
          "
